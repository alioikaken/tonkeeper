<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tonkeeper Fullscreen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'tk-dark': '#12161A',
                        'tk-blue': '#0098EA',
                        'tk-icon-blue': '#31A6F1',
                        'tk-text-gray': '#8A929A',
                        'tk-border': '#21262B',
                    },
                    borderRadius: {
                        'tk-btn': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #12161A; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        /* Фикс для мобильных браузеров, чтобы не дергалось */
        .main-container {
            height: 100dvh;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <div class="main-container w-full max-w-[420px] flex flex-col px-8 py-10">
        
        <main class="flex-grow flex flex-col justify-center">
            
            <h1 class="text-white text-[42px] font-extrabold leading-tight mb-12">
                Welcome<br>to <span class="text-tk-blue">Tonkeeper</span>
            </h1>

            <div class="space-y-10">
                <div class="flex gap-5 items-start">
                    <div class="flex-shrink-0 mt-1">
                        <svg width="38" height="38" viewBox="0 0 34 34" fill="none">
                            <path d="M28.3334 5.66666C28.3334 5.66666 19.8334 4.25 12.75 11.3333C8.67341 15.4099 7.08337 21.25 7.08337 21.25L11.3334 22.6667C11.3334 22.6667 12.0417 19.8333 14.1667 17.7083L19.8334 23.375C17.7084 25.5 14.875 26.2083 14.875 26.2083L16.2917 30.4583C16.2917 30.4583 22.1317 28.8683 26.2084 24.7917C33.2917 17.7083 31.875 9.20833 31.875 9.20833L28.3334 5.66666Z" fill="#31A6F1"/>
                            <circle cx="19.8334" cy="12.0417" r="2.125" fill="white"/>
                            <path d="M5.66663 22.6667L2.125 28.3333L8.5 26.9167L5.66663 22.6667Z" fill="#31A6F1"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-white font-bold text-[17px] mb-1">World-class speed</h3>
                        <p class="text-tk-text-gray text-[14.5px] leading-relaxed">
                            Thanks to the unique architecture of The Open Network, TON transactions are settled in seconds.
                        </p>
                    </div>
                </div>

                <div class="flex gap-5 items-start">
                    <div class="flex-shrink-0 mt-1">
                        <svg width="38" height="38" viewBox="0 0 34 34" fill="none">
                            <path d="M17 2.83334C17 2.83334 11.3333 5.66667 4.25 5.66667V15.5833C4.25 21.9796 9.72167 27.8529 17 31.1667C24.2783 27.8529 29.75 21.9796 29.75 15.5833V5.66667C22.6667 5.66667 17 2.83334 17 2.83334Z" fill="#31A6F1"/>
                            <circle cx="17" cy="15.4492" r="2.4375" fill="white"/>
                            <path d="M21.76 11.0181L18.562 14.2161C19.2356 15.042 19.4306 16.1303 19.0441 17.1583C18.5906 18.346 17.442 19.1506 16.1728 19.1506C14.5278 19.1506 13.1983 17.8211 13.1983 16.1761C13.1983 14.6587 14.3292 13.4286 15.8041 13.2229L21.76 11.0181Z" fill="white"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-white font-bold text-[17px] mb-1">End-to-end security</h3>
                        <p class="text-tk-text-gray text-[14.5px] leading-relaxed">
                            Tonkeeper stores your cryptographic keys on your device. Your crypto is always in your hands.
                        </p>
                    </div>
                </div>
            </div>

            <button class="w-full bg-tk-blue text-white font-bold text-[18px] py-4 rounded-tk-btn mt-16 hover:brightness-105 active:scale-[0.98] transition-all">
                Get started
            </button>
        </main>

        <footer class="text-center pt-6 pb-2">
            <span class="text-tk-text-gray opacity-50 text-[13px] font-mono">@TonkeeperPortalBot</span>
        </footer>
    </div>

</body>
</html>
